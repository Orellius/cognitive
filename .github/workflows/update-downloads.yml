name: Update SDK Downloads Badge

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch total SDK downloads from crates.io
        id: downloads
        run: |
          TOTAL=$(curl -s "https://crates.io/api/v1/crates?q=laminae-&per_page=20" \
            -H "User-Agent: laminae-badge-updater" | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          total = sum(c['downloads'] for c in data['crates'] if c['name'].startswith('laminae'))
          print(total)
          ")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "SDK total downloads: $TOTAL"

      - name: Format download count
        id: format
        run: |
          TOTAL=${{ steps.downloads.outputs.total }}
          if [ "$TOTAL" -ge 1000000 ]; then
            FORMATTED="$(echo "scale=1; $TOTAL/1000000" | bc)M"
          elif [ "$TOTAL" -ge 1000 ]; then
            FORMATTED="$(echo "scale=1; $TOTAL/1000" | bc)K"
          else
            FORMATTED="$TOTAL"
          fi
          echo "formatted=$FORMATTED" >> "$GITHUB_OUTPUT"
          echo "Formatted: $FORMATTED"

      - name: Update README badge
        run: |
          sed -i 's|crates.io_downloads-[^-]*-e6822a|crates.io_downloads-${{ steps.format.outputs.formatted }}-e6822a|' README.md

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update SDK downloads badge to ${{ steps.format.outputs.formatted }}"
          git push
